<div class="min-h-screen bg-[#0f172a] flex flex-col">

  <!-- Header -->
  <div class="bg-[#1e293b] px-4 pt-12 pb-4 border-b border-slate-700/50">
    <div class="max-w-lg mx-auto flex items-center gap-3">
      <a routerLink="/home" class="text-slate-400 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="flex items-center gap-3 flex-1">
        <div class="w-10 h-10 rounded-2xl bg-indigo-600 flex items-center justify-center text-xl font-bold">
          {{ sciUser()?.avatar || '🔬' }}
        </div>
        <div>
          <p class="text-white font-bold text-base leading-tight">{{ sciUser()?.displayName || 'Mi Cuenta' }}</p>
          <p class="text-slate-400 text-xs">@{{ sciUser()?.username || '...' }}</p>
        </div>
      </div>
    </div>

    <!-- Tabs con badges -->
    <div class="max-w-lg mx-auto mt-4 grid grid-cols-4 gap-1 bg-slate-800/60 rounded-2xl p-1">

      <!-- Amigos -->
      <button (click)="goTab('amigos')"
        [class]="activeTab() === 'amigos'
          ? 'relative bg-indigo-600 text-white font-bold rounded-xl py-2 text-sm transition-all'
          : 'relative text-slate-400 hover:text-white rounded-xl py-2 text-sm transition-all'">
        👥 Amigos
        @if (pendingRequestsCount() > 0) {
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-black w-5 h-5 rounded-full flex items-center justify-center shadow-lg">
            {{ pendingRequestsCount() > 9 ? '9+' : pendingRequestsCount() }}
          </span>
        }
      </button>

      <!-- Chat -->
      <button (click)="goTab('chat')"
        [class]="activeTab() === 'chat'
          ? 'relative bg-indigo-600 text-white font-bold rounded-xl py-2 text-sm transition-all'
          : 'relative text-slate-400 hover:text-white rounded-xl py-2 text-sm transition-all'">
        💬 Chat
        @if (unreadChatsCount() > 0) {
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-black w-5 h-5 rounded-full flex items-center justify-center shadow-lg">
            {{ unreadChatsCount() > 9 ? '9+' : unreadChatsCount() }}
          </span>
        }
      </button>

      <!-- Buscar -->
      <button (click)="goTab('buscar-amigos')"
        [class]="activeTab() === 'buscar-amigos'
          ? 'relative bg-indigo-600 text-white font-bold rounded-xl py-2 text-sm transition-all'
          : 'relative text-slate-400 hover:text-white rounded-xl py-2 text-sm transition-all'">
        🔍 Buscar
      </button>

      <!-- Progreso -->
      <button (click)="goTab('progreso')"
        [class]="activeTab() === 'progreso'
          ? 'relative bg-indigo-600 text-white font-bold rounded-xl py-2 text-sm transition-all'
          : 'relative text-slate-400 hover:text-white rounded-xl py-2 text-sm transition-all'">
        📈 Progreso
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </div>

</div>
